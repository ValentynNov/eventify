services:
  postgres:
    image: postgres:16-alpine
    container_name: eventify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventify_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - eventify_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventify_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventify-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventify_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_OPEN_IN_VIEW: "false"
#      SPRING_FLYWAY_ENABLED: "true"

      JWT_ISSUER: EventifyApi
      JWT_AUDIENCE: EventifyFrontend
      JWT_KEY: change_this_super_secret_key_with_at_least_32_chars
      JWT_EXPIRES_MINUTES: 120
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: 14

      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: eventify-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      HOSTNAME: 0.0.0.0
      PORT: 3000

volumes:
  eventify_postgres_data:
